<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark and Darker Bench Magical Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app view" id="calculatorView">
    <header>
      <div class="title-row">
        <h1>Darker Calculator</h1>
        <select class="class-select" id="characterClass" aria-label="Character class">
          <option value="warlock">Warlock</option>
          <option value="wizard">Wizard</option>
          <option value="cleric">Cleric</option>
        </select>
      </div>
    </header>

    <section class="calculator" aria-label="Class magic damage calculator">
      <div class="panel">
        <div class="panel-title">
          <h2>Inputs</h2>
        </div>

        <div class="controls">
          <div class="field full">
            <label for="spell">Spell Selection</label>
            <select id="spell"></select>
          </div>

          <div class="field" data-input="weaponDamage">
            <label for="weaponDamage">Magical Weapon Damage</label>
            <input id="weaponDamage" type="number" value="6" step="0.1">
          </div>

          <div class="field" data-input="magicPower">
            <label for="magicPower">Magic Power Bonus %</label>
            <input id="magicPower" type="number" value="20" step="0.1">
          </div>

          <div class="field" data-input="additionalDamage">
            <label for="additionalDamage">Additional Magical Damage</label>
            <input id="additionalDamage" type="number" value="5" step="0.1">
          </div>

          <div class="field" data-input="magicalHealing">
            <label for="magicalHealing">Magical Healing</label>
            <input id="magicalHealing" type="number" value="0" step="0.1">
          </div>

          <div class="field" data-input="mdr">
            <label for="mdr">Target Magic Damage Reduction %</label>
            <input id="mdr" type="number" value="0" step="0.1">
          </div>

          <div class="field" data-input="projectileReduction">
            <label for="projectileReduction">Target Projectile Damage Reduction %</label>
            <input id="projectileReduction" type="number" value="0" step="0.1">
          </div>

          <div class="field" data-input="penetration">
            <label for="penetration">Magic Penetration %</label>
            <input id="penetration" type="number" value="5" step="0.1">
          </div>

          <div class="field full" data-input="debuffDuration">
            <label for="debuffDuration">Target Debuff Duration %</label>
            <input id="debuffDuration" type="number" value="0" step="0.1">
          </div>

          <div class="class-options" id="warlockOptions">
            <div class="toggle-group" data-option="tortureMasterySource">
              <label>Torture Mastery Source</label>
              <div class="segmented">
                <label>
                  <input type="radio" name="tortureMasterySource" value="curse" checked>
                  <span>Curse Of Pain</span>
                </label>
                <label>
                  <input type="radio" name="tortureMasterySource" value="sacrifice">
                  <span>Power Of Sacrifice</span>
                </label>
              </div>
            </div>

            <label class="checkbox-field" for="curseMastery" data-option="curseMastery">
              <span>Curse Mastery</span>
              <input id="curseMastery" type="checkbox">
            </label>

            <label class="checkbox-field" for="vampirism" data-option="vampirism">
              <span>Vampirism</span>
              <input id="vampirism" type="checkbox">
            </label>

            <label class="checkbox-field" for="cow" data-option="cow" title="Curse of Weakness">
              <span>CoW</span>
              <input id="cow" type="checkbox">
            </label>
          </div>

          <div class="class-options" id="wizardOptions">
            <label class="checkbox-field" for="fireMastery" data-option="fireMastery">
              <span>Fire Mastery</span>
              <input id="fireMastery" type="checkbox">
            </label>
          </div>

          <div class="class-options" id="clericOptions">
            <label class="checkbox-field" for="faithfulness" data-option="faithfulness">
              <span>Faithfulness</span>
              <input id="faithfulness" type="checkbox">
            </label>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <h2 id="resultTitle">Total Damage Dealt</h2>
        </div>

        <div class="results">
          <div class="damage-list" id="damageList"></div>
        </div>

        <div class="footer-total">
          <span id="selectedLabel">Selected Result</span>
          <strong id="mainTotal">0.0</strong>
          <button class="hp-button" id="openHpView" type="button">HP bar display</button>
        </div>
      </div>
    </section>
  </main>

  <main class="app view hidden" id="hpView">
    <section class="hp-view" aria-label="HP bar damage display">
      <div class="hp-controls">
        <div class="field full">
          <label for="targetHp">Target HP</label>
          <input id="targetHp" type="number" value="100" min="1" step="1">
        </div>
        <div class="hp-readout" id="hpReadout">Damage: 0.0 / HP remaining: 100.0</div>
      </div>

      <div class="hp-bar-shell" aria-label="Target HP bar">
        <div class="hp-bar-track">
          <div class="hp-bar-fill" id="hpBarFill"></div>
          <div class="hp-bar-ghost" id="hpBarGhost"></div>
        </div>
      </div>

      <div class="hp-actions">
        <button class="back-button" id="showDamageDealt" type="button">Show damage dealt</button>
        <button class="back-button" id="backToCalculator" type="button">Back to calculator</button>
      </div>
    </section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
